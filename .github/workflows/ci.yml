name: CI

# CI (lint + types + tests) runs on every push — any branch or tag.
# The Docker image is built and published ONLY on tag pushes.
on:
  push:
    branches: ["**"]
    tags: ["**"]

# Cancel superseded runs on the same ref, but never interrupt a tag release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  ci:
    name: Lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv provisions Python 3.13 (from .python-version) on `uv sync`.
      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (exact, from uv.lock)
        run: uv sync --frozen --extra dev

      - name: Lockfile in sync with pyproject.toml
        run: uv lock --check

      - name: Format (ruff)
        run: uv run ruff format --check src tests

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy --strict)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest

  docker:
    name: Build & push image
    needs: ci
    # Gate: only tag pushes produce an image; skipped on every branch push.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag. Semver tags (v1.2.3) expand to
      # 1.2.3, 1.2, 1, and `latest` (latest only for non-prerelease semver);
      # type=ref,event=tag also emits the raw tag name so non-semver tags work.
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
